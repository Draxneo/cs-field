<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"/>
<meta name="theme-color" content="#0e1525"/>
<link rel="manifest" href="manifest.webmanifest"/>
<title>Carnes &amp; Sons — Old Equipment Capture</title>
<style>
  :root{ --bg:#0e1525; --surface:#16203a; --surface2:#1d2a4a; --line:#27365c; --text:#e8edf7; --muted:#93a1c4; --accent:#34d3ee; --ok:#34d399; --warn:#fbbf24; --bad:#f43f5e; --grad:linear-gradient(135deg,#34d3ee,#5b8cff); }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:var(--bg); color:var(--text); font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; padding:0 0 90px; }
  header{ position:sticky; top:0; z-index:5; background:var(--bg); border-bottom:1px solid var(--line); padding:14px 16px; }
  header h1{ margin:0; font-size:17px; } header .sub{ color:var(--muted); font-size:13px; margin-top:2px; }
  main{ padding:14px 16px; max-width:560px; margin:0 auto; }
  .card{ background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:14px; margin:0 0 14px; }
  .card h2{ margin:0 0 4px; font-size:16px; display:flex; align-items:center; gap:8px; }
  .hint{ color:var(--muted); font-size:13px; }
  .ph{ width:100%; height:190px; border:2px dashed var(--line); border-radius:12px; background:var(--surface2); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--muted); cursor:pointer; overflow:hidden; }
  .ph img{ width:100%; height:100%; object-fit:cover; }
  .ph .ic{ font-size:38px; }
  input[type=file]{ display:none; }
  label.fld{ display:block; font-size:12px; color:var(--muted); margin:10px 0 3px; }
  input[type=text], input[type=number]{ width:100%; padding:11px 12px; font-size:16px; border-radius:10px; border:1px solid var(--line); background:var(--bg); color:var(--text); }
  .row2{ display:flex; gap:10px; } .row2>div{ flex:1; }
  .seg{ display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }
  .seg button{ flex:1; min-width:92px; padding:11px; border-radius:10px; border:1px solid var(--line); background:var(--surface2); color:var(--text); font-size:14px; font-weight:600; cursor:pointer; }
  .seg button.on{ background:var(--grad); color:#06121f; border-color:transparent; }
  .pill{ font-size:11px; padding:2px 8px; border-radius:999px; background:var(--surface2); color:var(--muted); }
  .pill.ok{ background:rgba(52,211,153,.16); color:#a7f3d0; } .pill.todo{ background:rgba(251,191,36,.16); color:#fde68a; }
  .spin{ width:18px;height:18px;border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:s .8s linear infinite; display:inline-block; vertical-align:middle; }
  @keyframes s{ to{ transform:rotate(360deg);} }
  footer{ position:fixed; left:0; right:0; bottom:0; background:var(--bg); border-top:1px solid var(--line); padding:12px 16px calc(12px + env(safe-area-inset-bottom)); }
  footer .wrap{ max-width:560px; margin:0 auto; }
  .btn{ width:100%; padding:15px; font-size:17px; font-weight:800; border:none; border-radius:12px; background:var(--grad); color:#06121f; cursor:pointer; }
  .btn[disabled]{ opacity:.5; }
  .center{ text-align:center; padding:40px 20px; }
  .big{ font-size:54px; } .muted{ color:var(--muted); }
  .extra-grid{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .extra-grid img{ width:72px; height:72px; object-fit:cover; border-radius:8px; }
</style>
</head>
<body>
<div id="app"><div class="center"><div class="spin"></div><div class="muted" style="margin-top:12px">Loading…</div></div></div>

<script>
const BASE = "https://bqsjbwwkjhrthqxgybht.supabase.co/functions/v1/field-capture";
const TOKEN = new URLSearchParams(location.search).get("t") || "";
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));

// in-memory capture state
const cap = {
  outdoor:{model:"",serial:"",photo:""}, indoor:{model:"",serial:"",photo:""}, furnace:{model:"",serial:"",photo:""},
  system_age:"", operational:null, hp_type:null, extra_photos:[]
};

async function api(body){
  const r = await fetch(BASE,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
  return r.json().catch(()=>({error:"network"}));
}

// downscale a File to a JPEG dataURL (max 1600px long edge) so uploads stay small + under the API limit
function fileToScaledDataUrl(file){
  return new Promise((resolve,reject)=>{
    const img = new Image(); const url = URL.createObjectURL(file);
    img.onload = ()=>{
      const max=1600; let w=img.naturalWidth||1200,h=img.naturalHeight||900; const sc=Math.min(1,max/Math.max(w,h));
      w=Math.round(w*sc); h=Math.round(h*sc);
      const c=document.createElement("canvas"); c.width=w; c.height=h; c.getContext("2d").drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url); resolve(c.toDataURL("image/jpeg",0.85));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(url); reject(); }; img.src=url;
  });
}

function plateCard(slot, title, icon){
  const c = cap[slot];
  const done = c.model && c.serial;
  return `<div class="card" id="card-${slot}">
    <h2>${icon} ${title} <span class="pill ${done?'ok':'todo'}" id="pill-${slot}">${done?'✓ read':'needs photo'}</span></h2>
    <div class="hint">Snap the metal data plate on the OLD ${title.toLowerCase()}.</div>
    <label class="ph" for="file-${slot}" id="ph-${slot}">${c.photo?`<img src="${esc(c.photo)}"/>`:`<div class="ic">📷</div><div>Take photo</div>`}</label>
    <input type="file" id="file-${slot}" accept="image/*" capture="environment"/>
    <div id="fields-${slot}" style="${done||c.photo?'':'display:none'}">
      <label class="fld">Model #</label><input type="text" id="model-${slot}" value="${esc(c.model)}" placeholder="model number"/>
      <label class="fld">Serial #</label><input type="text" id="serial-${slot}" value="${esc(c.serial)}" placeholder="serial number"/>
    </div>
  </div>`;
}

function render(job){
  $("app").innerHTML = `
  <header>
    <h1>Old Equipment Capture</h1>
    <div class="sub">${esc(job.customer_name||"Customer")}${job.job_number?` · Job #${esc(job.job_number)}`:""}</div>
  </header>
  <main>
    <div class="card" style="background:rgba(52,211,238,.08)">
      <div style="font-weight:700">Snap the OLD units before you pull them.</div>
      <div class="hint">We read the model &amp; serial for you — just check it's right. Complete capture = <b>$100 bonus</b>.</div>
    </div>
    ${plateCard("outdoor","Condenser (outdoor)","🌀")}
    ${plateCard("indoor","Coil (indoor)","❄️")}
    ${plateCard("furnace","Furnace / Air handler","🔥")}
    <div class="card">
      <h2>📋 System details</h2>
      <label class="fld">Approx. age of old system (years)</label>
      <input type="number" id="age" inputmode="numeric" value="${esc(cap.system_age)}" placeholder="e.g. 12"/>
      <label class="fld">Was it still running (operational)?</label>
      <div class="seg" id="seg-op">
        <button data-op="yes">Yes — running</button>
        <button data-op="no">No — dead</button>
      </div>
      <label class="fld">Heat type (only if it's a heat pump)</label>
      <div class="seg" id="seg-hp">
        <button data-hp="air_source">Heat pump</button>
        <button data-hp="electrical_resistance">Electric strips</button>
        <button data-hp="none">N/A (gas)</button>
      </div>
    </div>
    <div class="card">
      <h2>➕ Extra photos <span class="hint">(optional)</span></h2>
      <label class="ph" for="file-extra" style="height:90px"><div class="ic" style="font-size:26px">📷</div><div>Add a photo</div></label>
      <input type="file" id="file-extra" accept="image/*" capture="environment"/>
      <div class="extra-grid" id="extra-grid"></div>
    </div>
  </main>
  <footer><div class="wrap">
    <div class="hint" id="submit-hint" style="margin-bottom:8px;text-align:center"></div>
    <button class="btn" id="submit">Submit capture</button>
  </div></footer>`;

  ["outdoor","indoor","furnace"].forEach(wirePlate);
  $("file-extra").addEventListener("change", onExtra);
  $("age").addEventListener("input", e => cap.system_age = e.target.value);
  $("seg-op").querySelectorAll("[data-op]").forEach(b => b.onclick = () => { cap.operational = b.dataset.op==="yes"; paintSeg("seg-op","op", b.dataset.op); updateHint(); });
  $("seg-hp").querySelectorAll("[data-hp]").forEach(b => b.onclick = () => { cap.hp_type = b.dataset.hp==="none"?null:b.dataset.hp; paintSeg("seg-hp","hp", b.dataset.hp); });
  $("submit").addEventListener("click", submit);
  updateHint();
}

function paintSeg(seg,attr,val){ $(seg).querySelectorAll("[data-"+attr+"]").forEach(b => b.classList.toggle("on", b.dataset[attr]===val)); }

function wirePlate(slot){
  $("file-"+slot).addEventListener("change", async (e) => {
    const f = e.target.files && e.target.files[0]; if(!f) return;
    const ph = $("ph-"+slot); ph.innerHTML = `<div class="spin"></div><div style="margin-top:8px">Reading plate…</div>`;
    let dataUrl; try{ dataUrl = await fileToScaledDataUrl(f); }catch(_){ ph.innerHTML = `<div class="ic">📷</div><div>Try again</div>`; return; }
    const res = await api({ action:"read", link_token:TOKEN, image_b64:dataUrl, slot });
    if(!res || !res.ok){ ph.innerHTML = `<div class="ic">⚠️</div><div>Upload failed — retry</div>`; return; }
    cap[slot].photo = res.photo_url; cap[slot].model = res.model||""; cap[slot].serial = res.serial||"";
    ph.innerHTML = `<img src="${esc(res.photo_url)}"/>`;
    const fld = $("fields-"+slot); fld.style.display=""; $("model-"+slot).value = cap[slot].model; $("serial-"+slot).value = cap[slot].serial;
    $("model-"+slot).oninput = ev => cap[slot].model = ev.target.value;
    $("serial-"+slot).oninput = ev => cap[slot].serial = ev.target.value;
    refreshPill(slot); updateHint();
  });
  // if returning with data, keep inputs wired
  $("model-"+slot) && ($("model-"+slot).oninput = ev => { cap[slot].model = ev.target.value; refreshPill(slot); updateHint(); });
  $("serial-"+slot) && ($("serial-"+slot).oninput = ev => { cap[slot].serial = ev.target.value; refreshPill(slot); updateHint(); });
}
function refreshPill(slot){ const d=cap[slot].model&&cap[slot].serial; const p=$("pill-"+slot); if(p){ p.textContent=d?"✓ read":"needs photo"; p.className="pill "+(d?"ok":"todo"); } }

async function onExtra(e){
  const f = e.target.files && e.target.files[0]; if(!f) return;
  let dataUrl; try{ dataUrl = await fileToScaledDataUrl(f); }catch(_){ return; }
  const res = await api({ action:"read", link_token:TOKEN, image_b64:dataUrl, slot:"extra" });
  if(res && res.ok && res.photo_url){ cap.extra_photos.push(res.photo_url); const g=$("extra-grid"); const im=document.createElement("img"); im.src=res.photo_url; g.appendChild(im); }
  e.target.value="";
}

function missing(){
  const m=[]; ["outdoor","indoor","furnace"].forEach(s=>{ if(!(cap[s].model&&cap[s].serial)) m.push(s==="outdoor"?"condenser":s==="indoor"?"coil":"furnace"); });
  if(!cap.system_age) m.push("age"); if(cap.operational===null) m.push("running?"); return m;
}
function updateHint(){
  const m=missing(); const h=$("submit-hint"); const btn=$("submit"); if(!h||!btn) return;
  if(m.length===0){ h.innerHTML = `<span style="color:var(--ok)">✓ Complete — $100 bonus</span>`; btn.textContent="Submit capture ✓"; }
  else { h.innerHTML = `<span style="color:var(--warn)">Still need: ${m.join(", ")}</span>`; btn.textContent="Submit anyway"; }
}

async function submit(){
  const btn=$("submit"); btn.disabled=true; btn.textContent="Submitting…";
  const res = await api({ action:"submit", link_token:TOKEN,
    outdoor:cap.outdoor, indoor:cap.indoor, furnace:cap.furnace,
    system_age:cap.system_age, operational:cap.operational, hp_type:cap.hp_type, extra_photos:cap.extra_photos });
  if(!res || !res.ok){ btn.disabled=false; btn.textContent="Submit capture"; alert("Submit failed — check signal and try again."); return; }
  $("app").innerHTML = `<div class="center">
    <div class="big">${res.complete?"✅":"📤"}</div>
    <h1 style="margin:10px 0 6px">${res.complete?"Captured — $100 bonus!":"Submitted"}</h1>
    <div class="muted">${res.complete?"All old-equipment info is in. Nice work.":"Got it, but some old-equipment info was missing. The office may follow up."}</div>
    <div class="muted" style="margin-top:18px;font-size:13px">You can close this page.</div>
  </div>`;
  window.scrollTo(0,0);
}

(async function init(){
  if(!TOKEN){ $("app").innerHTML = `<div class="center"><div class="big">🔗</div><h1>Missing link code</h1><div class="muted">Open the link from your text message.</div></div>`; return; }
  const res = await api({ action:"get", link_token:TOKEN });
  if(!res || !res.ok){ $("app").innerHTML = `<div class="center"><div class="big">⚠️</div><h1>Link not valid</h1><div class="muted">${esc((res&&res.error)||"This capture link is invalid or expired. Ask the office for a new one.")}</div></div>`; return; }
  // preload any already-submitted values
  const c = res.capture || {};
  cap.outdoor = {model:c.old_outdoor_model||"",serial:c.old_outdoor_serial||"",photo:c.old_outdoor_photo||""};
  cap.indoor  = {model:c.old_indoor_model||"", serial:c.old_indoor_serial||"", photo:c.old_indoor_photo||""};
  cap.furnace = {model:c.old_furnace_model||"",serial:c.old_furnace_serial||"",photo:c.old_furnace_photo||""};
  cap.system_age = c.system_age||""; cap.operational = (typeof c.operational==="boolean")?c.operational:null;
  cap.hp_type = c.hp_type||null; cap.extra_photos = Array.isArray(c.extra_photos)?c.extra_photos:[];
  render(c);
  if(cap.operational!==null) paintSeg("seg-op","op",cap.operational?"yes":"no");
  if(cap.hp_type) paintSeg("seg-hp","hp",cap.hp_type);
  (cap.extra_photos||[]).forEach(u=>{ const im=document.createElement("img"); im.src=u; $("extra-grid").appendChild(im); });
})();
</script>
</body>
</html>
